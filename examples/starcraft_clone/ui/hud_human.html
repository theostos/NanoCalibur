<div
  style="
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    min-height: 84px;
    padding: 10px 14px;
    box-sizing: border-box;
    background: linear-gradient(180deg, rgba(8, 10, 14, 0.88), rgba(5, 7, 10, 0.96));
    border-top: 1px solid rgba(145, 168, 198, 0.45);
    color: #d8e6ff;
    font-family: monospace;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  "
>
  <div>
    <div>Role: {{role.id}}</div>
    <div>Minerals: {{role.minerals}}</div>
    <div>Gas: {{role.gas}}</div>
    <div>Supply: {{role.supply_used}} / {{role.supply_cap}}</div>
  </div>
  <div style="text-align: right">
    <div>Selection: {{role.selected_name}}</div>
    <div>Selection Count: {{role.selected_count}}</div>
    <div>Selection UID: {{role.selected_uid}}</div>
    <div>Selected UIDs: {{role.selected_uids}}</div>
    <div>Elapsed: {{__scene_elapsed}}</div>
  </div>
</div>
